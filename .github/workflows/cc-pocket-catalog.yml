name: cc-pocket-catalog

on:
  push:
    paths:
      - "integrations/cc-pocket/**"
      - "scripts/build-cc-pocket-catalog.py"
      - "engineering/**"
      - "design/**"
      - "security/**"
      - "testing/**"
      - "product/**"
      - "project-management/**"
      - "specialized/**"
  pull_request:
    paths:
      - "integrations/cc-pocket/**"
      - "scripts/build-cc-pocket-catalog.py"
      - "engineering/**"
      - "design/**"
      - "security/**"
      - "testing/**"
      - "product/**"
      - "project-management/**"
      - "specialized/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python3 scripts/build-cc-pocket-catalog.py
      - name: Generated manifest is committed and current
        run: git diff --exit-code -- integrations/cc-pocket/dist/agents.zh-CN.json
